name: Verilog

on:
  push:
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install HDL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog ghdl yosys

      - name: Lint Verilog sources
        run: python3 scripts/lint_hdl.py --verilog

      - name: Build generic stream smoke test
        run: |
          iverilog -g2001 -o spwstream_smoke_tb.vvp \
            bench/verilog/spwstream_smoke_tb.v \
            rtl/verilog/syncdff.v \
            rtl/verilog/spwram.v \
            rtl/verilog/spwlink.v \
            rtl/verilog/spwxmit.v \
            rtl/verilog/spwxmit_fast.v \
            rtl/verilog/spwrecv.v \
            rtl/verilog/spwrecvfront_generic.v \
            rtl/verilog/spwrecvfront_fast.v \
            rtl/verilog/spwstream.v

      - name: Run generic stream smoke test
        run: vvp spwstream_smoke_tb.vvp

      - name: Build fast stream smoke test
        run: |
          iverilog -g2001 -o spwstream_fast_smoke_tb.vvp \
            bench/verilog/spwstream_fast_smoke_tb.v \
            rtl/verilog/syncdff.v \
            rtl/verilog/spwram.v \
            rtl/verilog/spwlink.v \
            rtl/verilog/spwxmit.v \
            rtl/verilog/spwxmit_fast.v \
            rtl/verilog/spwrecv.v \
            rtl/verilog/spwrecvfront_generic.v \
            rtl/verilog/spwrecvfront_fast.v \
            rtl/verilog/spwstream.v

      - name: Run fast stream smoke test
        run: vvp spwstream_fast_smoke_tb.vvp

      - name: Build loopback coverage test
        run: |
          iverilog -g2001 -o spwstream_loopback_tb.vvp \
            bench/verilog/spwstream_loopback_tb.v \
            rtl/verilog/syncdff.v \
            rtl/verilog/spwram.v \
            rtl/verilog/spwlink.v \
            rtl/verilog/spwxmit.v \
            rtl/verilog/spwxmit_fast.v \
            rtl/verilog/spwrecv.v \
            rtl/verilog/spwrecvfront_generic.v \
            rtl/verilog/spwrecvfront_fast.v \
            rtl/verilog/spwstream.v

      - name: Run loopback coverage test
        run: vvp spwstream_loopback_tb.vvp

      - name: Build translated spwlink test bench
        run: |
          iverilog -g2001 -o spwlink_tb_all.vvp \
            bench/verilog/spwlink_tb.v \
            bench/verilog/spwlink_tb_all.v \
            rtl/verilog/syncdff.v \
            rtl/verilog/spwram.v \
            rtl/verilog/spwlink.v \
            rtl/verilog/spwxmit.v \
            rtl/verilog/spwxmit_fast.v \
            rtl/verilog/spwrecv.v \
            rtl/verilog/spwrecvfront_generic.v \
            rtl/verilog/spwrecvfront_fast.v \
            rtl/verilog/spwstream.v

      - name: Run translated spwlink test bench
        run: vvp spwlink_tb_all.vvp

      - name: Build translated streamtest bench
        run: |
          iverilog -g2001 -o streamtest_tb.vvp \
            bench/verilog/streamtest_tb.v \
            rtl/verilog/streamtest.v \
            rtl/verilog/syncdff.v \
            rtl/verilog/spwram.v \
            rtl/verilog/spwlink.v \
            rtl/verilog/spwxmit.v \
            rtl/verilog/spwxmit_fast.v \
            rtl/verilog/spwrecv.v \
            rtl/verilog/spwrecvfront_generic.v \
            rtl/verilog/spwrecvfront_fast.v \
            rtl/verilog/spwstream.v

      - name: Run translated streamtest bench
        run: vvp streamtest_tb.vvp

      - name: Compare VHDL and Verilog stream traces
        run: python3 scripts/compare_vhdl_verilog_traces.py

      - name: Compare VHDL and Verilog stream waveforms
        run: python3 scripts/compare_vhdl_verilog_waveforms.py

      - name: Check spwlink parity manifest
        run: python3 scripts/check_spwlink_parity_manifest.py

      - name: Run VHDL spwlink parity test
        run: |
          ghdl --clean
          ghdl -a --std=08 -fsynopsys \
            rtl/vhdl/spwpkg.vhd \
            rtl/vhdl/spwlink.vhd \
            rtl/vhdl/spwrecv.vhd \
            rtl/vhdl/spwxmit.vhd \
            rtl/vhdl/spwxmit_fast.vhd \
            rtl/vhdl/spwrecvfront_generic.vhd \
            rtl/vhdl/spwrecvfront_fast.vhd \
            rtl/vhdl/syncdff.vhd \
            rtl/vhdl/spwram.vhd \
            bench/vhdl/spwlink_tb.vhd \
            bench/vhdl/spwlink_tb_all.vhd
          ghdl -e --std=08 -fsynopsys spwlink_tb_all
          ghdl -r --std=08 -fsynopsys spwlink_tb_all --assert-level=error

      - name: Run VHDL stream parity test
        run: |
          ghdl --clean
          ghdl -a --std=08 -fsynopsys \
            rtl/vhdl/spwpkg.vhd \
            rtl/vhdl/spwlink.vhd \
            rtl/vhdl/spwrecv.vhd \
            rtl/vhdl/spwxmit.vhd \
            rtl/vhdl/spwxmit_fast.vhd \
            rtl/vhdl/spwrecvfront_generic.vhd \
            rtl/vhdl/spwrecvfront_fast.vhd \
            rtl/vhdl/syncdff.vhd \
            rtl/vhdl/spwram.vhd \
            rtl/vhdl/spwstream.vhd \
            rtl/vhdl/streamtest.vhd \
            bench/vhdl/streamtest_tb.vhd
          ghdl -e --std=08 -fsynopsys streamtest_tb
          ghdl -r --std=08 -fsynopsys streamtest_tb --assert-level=error

      - name: Compare VHDL and Verilog synthesis resources
        run: python3 scripts/synth_resource_compare.py

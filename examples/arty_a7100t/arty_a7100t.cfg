# OpenOCD config for the Digilent Arty A7-100T onboard USB-JTAG (FT2232).
# Usage:
#   openocd -f examples/arty_a7100t/arty_a7100t.cfg
# Then from the host:
#   fcapz --backend openocd --host 127.0.0.1 --port 6666 --tap xc7a100t.tap probe

adapter driver ftdi
ftdi vid_pid 0x0403 0x6010
ftdi channel 0
ftdi layout_init 0x0088 0x008b
ftdi layout_signal nTRST -data 0x0010 -noe 0x0010
ftdi layout_signal nSRST -data 0x0020 -noe 0x0020

transport select jtag
adapter speed 10000

set _CHIPNAME xc7a100t
set _IDCODE 0x13631093

jtag newtap $_CHIPNAME tap -irlen 6 -expected-id $_IDCODE

init
